<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Deudas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor">
        <div class="columna">
            <h1>💰 Calculadora de Deudas</h1>
            <h2>Ingresos</h2>
            <input type="text" id="sueldo" oninput="formatearNumero(this)" placeholder="Ej: 2.000.000">

            <h2>Gastos Fijos</h2>
            <table id="tablaGastos">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Valor</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <button onclick="agregarGasto()">+ Agregar gasto</button>
        </div>

        <div class="columna">
            <h2>Deudas Actuales</h2>
            <table id="tablaDeudas">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Monto</th>
                        <th>Estado</th>
                        <th>Pago mínimo</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:20px;">
                <button onclick="agregarDeuda()">+ Deuda</button>
                <button onclick="irAResultados()" style="background:#28a745;">📊 Ver resultados</button>
                <button onclick="limpiarTodo()" style="background:#6c757d;">🗑 Limpiar</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
