<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - Plan de Libertad</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="contenedor" id="contenido-pdf">
        <div class="columna">
            <h2 id="tituloPdf">📊 Resumen de Salud Financiera</h2>
            <div id="kpis" style="display:flex; gap:10px; margin-bottom:20px; flex-wrap: wrap;">
                <div class="kpi"><h3>Sobrante/Mes</h3><p id="kpiDisp"></p></div>
                <div class="kpi"><h3>Deuda Total</h3><p id="kpiDeuda"></p></div>
                <div class="kpi"><h3>Endeudamiento</h3><p id="kpiPorc"></p></div>
            </div>

            <div id="alertas"></div>

            <div class="opciones-no-pdf" style="background:#eef2f7; padding:15px; border-radius:10px; margin-bottom: 20px;">
                <h4>Estrategia Seleccionada:</h4>
                <label><input type="radio" name="metodo" value="normal" checked onchange="recalcular()"> Normal (Orden ingreso)</label><br>
                <label><input type="radio" name="metodo" value="snowball" onchange="recalcular()"> Bola de Nieve (Menor a Mayor)</label>
            </div>
            
            <div id="resumenLibertad" style="font-weight:bold; margin-bottom:20px; color:#28a745; font-size: 1.1em;"></div>
            
            <div style="display: flex; gap: 10px;">
                <button onclick="window.location='index.html'" style="background:#6c757d;">← Volver</button>
                <button onclick="exportarPDF()" style="background:#007bff;">📥 Descargar PDF</button>
            </div>
        </div>

        <div class="columna">
            <h2>📈 Proyección de Pagos</h2>
            <div style="height: 300px; margin-bottom: 20px;">
                <canvas id="graficoFinanciero"></canvas>
            </div>
            <div style="overflow-x:auto;">
                <table id="tablaAmortizacion" class="tabla-detalle"></table>
            </div>
        </div>
    </div>
    <script src="resultados.js"></script>
</body>
</html>
