<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados y Proyección</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="contenedor">
        <div class="columna">
            <h2>📊 Resumen de Salud</h2>
            <div id="kpis" style="display:flex; gap:10px; margin-bottom:20px; flex-wrap: wrap;">
                <div class="kpi"><h3>Disponible</h3><p id="kpiDisp"></p></div>
                <div class="kpi"><h3>Deuda Total</h3><p id="kpiDeuda"></p></div>
                <div class="kpi"><h3>% Endeud.</h3><p id="kpiPorc"></p></div>
            </div>

            <div id="alertas"></div>

            <div style="background:#eef2f7; padding:15px; border-radius:10px; margin-bottom: 20px;">
                <h4>Estrategia de Pago:</h4>
                <label><input type="radio" name="metodo" value="normal" checked onchange="recalcular()"> Normal (Orden ingreso)</label><br>
                <label><input type="radio" name="metodo" value="snowball" onchange="recalcular()"> Bola de Nieve (Menor deuda)</label>
            </div>
            
            <div id="resumenLibertad" style="font-weight:bold; margin-bottom:20px; color:#28a745; font-size: 1.1em;"></div>
            <button onclick="window.location='index.html'" style="background:#6c757d;">← Volver</button>
        </div>

        <div class="columna">
            <h2>📈 Planificación Detallada</h2>
            <canvas id="graficoFinanciero"></canvas>
            <div style="overflow-x:auto;">
                <table id="tablaAmortizacion" class="tabla-detalle"></table>
            </div>
        </div>
    </div>
    <script src="resultados.js"></script>
</body>
</html>
